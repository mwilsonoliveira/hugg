services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hugg_postgres
    environment:
      POSTGRES_USER: hugg
      POSTGRES_PASSWORD: hugg
      POSTGRES_DB: hugg
    ports:
      - "5434:5432"
    volumes:
      - hugg_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hugg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hugg_redis
    ports:
      - "6379:6379"
    volumes:
      - hugg_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hugg_postgres_data:
  hugg_redis_data:
